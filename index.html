    <!-- GitHub Pages SPA redirect fix -->
    <script>
      (function () {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          window.history.replaceState(null, null, path || '/');
        }
      })();
    </script>
